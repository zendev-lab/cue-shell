name: "CI - Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.90"
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Check cue-cli feature matrix with clippy
        run: |
          set -euo pipefail

          for features in \
            "" \
            "daemon" \
            "extensions" \
            "script" \
            "tui" \
            "daemon,extensions" \
            "daemon,script" \
            "daemon,tui" \
            "extensions,script" \
            "extensions,tui" \
            "script,tui" \
            "daemon,extensions,script" \
            "daemon,extensions,tui" \
            "daemon,script,tui" \
            "extensions,script,tui" \
            "daemon,extensions,script,tui"
          do
            if [ -z "$features" ]; then
              cargo clippy -p cue-cli --no-default-features --all-targets -- -D warnings
            else
              cargo clippy -p cue-cli --no-default-features --features "$features" --all-targets -- -D warnings
            fi
          done

      - name: Run tests with coverage
        run: cargo llvm-cov test --lcov --output-path lcov.info -- --no-capture

      - name: Run doc tests
        run: cargo test --doc --all-features

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
